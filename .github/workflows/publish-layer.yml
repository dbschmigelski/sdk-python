name: Publish PyPI Package to Lambda Layer

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: 'Package version to download'
        required: true
        type: string
      confirm:
        description: 'Type "yes" to confirm publishing the layer'
        required: true
        type: string

jobs:
  publish-layer:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Checkout strands-agents/docs repository
        uses: actions/checkout@v4
        with:
          repository: strands-agents/docs
          token: ${{ secrets.GITHUB_TOKEN }}
          path: docs-repo
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "yes" ]; then
            echo "Confirmation failed. You must type 'yes' to proceed."
            exit 1
          fi
          echo "Confirmation validated"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
          aws-region: us-east-1

      - name: Create layer directory structure
        run: |
          mkdir -p layer/python

      - name: Download and install package
        run: |
          pip install strands-agents==${{ inputs.package_version }} -t layer/python/

      - name: Remove unnecessary files
        run: |
          find layer/python -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find layer/python -type d -name "*.dist-info" -exec rm -rf {} + 2>/dev/null || true
          find layer/python -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find layer/python -name "*.pyc" -delete 2>/dev/null || true

      - name: Create layer zip
        run: |
          cd layer
          zip -r ../lambda-layer.zip .
          
      - name: Upload layer to S3
        run: |
          BUCKET_NAME="strands-agents-lambda-layers-$(aws sts get-caller-identity --query Account --output text)"
          LAYER_KEY="strands-agents/v${{ inputs.package_version }}/lambda-layer.zip"

          aws s3 cp lambda-layer.zip "s3://$BUCKET_NAME/$LAYER_KEY"

          echo "LAYER_S3_KEY=$LAYER_KEY" >> $GITHUB_ENV
          echo "Uploaded layer to s3://$BUCKET_NAME/$LAYER_KEY"

          echo "layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT
          echo "layer_version=$LAYER_VERSION" >> $GITHUB_OUTPUT
          echo "Published layer version $LAYER_VERSION with ARN: $LAYER_ARN"


      - name: Publish Lambda Layer from S3
        id: publish-layer
        run: |
          DESCRIPTION="PyPI package: strands-agents v${{ inputs.package_version }}"

          LAYER_OUTPUT=$(aws lambda publish-layer-version \
            --layer-name strands-agents \
            --description "$DESCRIPTION" \
            --content S3Bucket="$BUCKET_NAME",S3Key="$LAYER_S3_KEY" \
            --compatible-runtimes python3.10 python3.11 python3.12 \
            --region us-east-1 \
            --output json)

          LAYER_ARN=$(echo "$LAYER_OUTPUT" | jq -r '.LayerArn')
          LAYER_VERSION=$(echo "$LAYER_OUTPUT" | jq -r '.Version')

          echo "layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT
          echo "layer_version=$LAYER_VERSION" >> $GITHUB_OUTPUT
          echo "Published layer version $LAYER_VERSION with ARN: $LAYER_ARN"
